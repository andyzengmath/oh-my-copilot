name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: build + test (${{ matrix.os }}, node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ["20"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      # Plugin mirror parity: skills/prompts/agents under plugins/oh-my-ghcopilot/
      # must match the canonical source trees. Fails CI if the mirror drifted.
      - name: Plugin mirror parity (sync:plugin --check)
        run: npm run sync:plugin:check

      - name: Plugin bundle verification
        run: npm run verify:plugin-bundle

      - name: Smoke test (omghc version)
        run: node dist/cli/omghc.js version

      # Tests use node:test and are platform-agnostic. Team-mode tests that
      # require tmux self-skip when tmux is unavailable (Windows runners), and
      # worktree tests self-skip when git is unavailable.
      - name: Run tests
        run: npm test
